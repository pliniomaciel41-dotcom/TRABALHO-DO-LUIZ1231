<!-- LOGIN.HTML -->

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="style.css2.css">

    <title>Login</title>
    
</head>

<body>

    <main class="container">

        <form>

            <h1>Login do cardapio</h1>

            <div class="input-box">

                <input placeholder="Usuário" type="email">          

                <i class="bx bxs-user"></i>

            </div>

            <div class="input-box">

                <input placeholder="Senha" type="password">

                <i class="bx bxs-lock-alt"></i>

            </div>

            <button 
            type="button"
            onclick="window.location.href='cardapio.html'">

                Login

            </button>

            <div class="register-link">

                <a href="#" class="forgot-password">
                    Esqueci minha senha
                </a>

                <p>
                    Não tem uma conta?

                    <a href="cadastro.html">
                        Cadastre-se
                    </a>
                </p>

            </div>

        </form>

    </main>    

</body>

</html>
